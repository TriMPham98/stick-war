<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stick War • Three.js</title>
    <meta name="description" content="A Three.js recreation of the classic Flash strategy game Stick War. Mine gold, train units, destroy the enemy statue." />
  </head>
  <body>
    <!-- Three.js full-screen canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- UI Overlay (vanilla DOM) -->
    <div id="ui">
      <!-- Top bar: resources + info -->
      <div id="top-bar">
        <div class="stat">
          <span class="label">GOLD</span>
          <span id="gold-value">150</span>
        </div>
        <div class="stat">
          <span class="label">INCOME</span>
          <span id="income-value">+0/s</span>
        </div>
        <div class="stat right">
          <span id="status-text">ORDER vs ENEMY • DEMO</span>
        </div>
      </div>

      <!-- Left production panel (will be populated by TS) -->
      <div id="production-panel">
        <h3>TRAIN UNITS</h3>
        <div id="production-buttons">
          <!-- Populated dynamically in main.ts for Phase 0 demo -->
        </div>
        <div id="queue-display">
          <span id="queue-text">Queue: —</span>
        </div>
      </div>

      <!-- Minimal instructions / status -->
      <div id="instructions">
        <strong>Controls:</strong><br>
        <strong>Left-click</strong> units to select (Shift for multi) • <strong>Right-click</strong> to Move/Attack • <strong>S</strong> = Stop selected<br>
        <strong>Drag</strong> to pan camera • Scroll to zoom. Train units on the left. Destroy the enemy statue!
      </div>

      <!-- Game Over Overlay (Phase 4) -->
      <div id="game-over" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,0.75); align-items:center; justify-content:center; flex-direction:column; z-index:100;">
        <div style="background:#121317; padding:32px 48px; border-radius:12px; border:1px solid #2a2d36; text-align:center; min-width: 280px;">
          <h2 id="game-over-title" style="margin:0 0 12px; font-size:28px;"></h2>
          <div id="game-over-stats" style="margin-bottom: 16px;"></div>
          <button id="restart-btn" style="margin-top:8px; padding:10px 24px; font-size:15px; background:#1c1f26; border:1px solid #5ab0ff; color:#c5c8d1; border-radius:6px; cursor:pointer;">Play Again</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
